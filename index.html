<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <div class="main"> 
        
        <div class="book-list">

        </div>      
     <button class="add-button button" command="show-modal" commandfor="add-book-dialog">Add Book</button>
        <dialog id="add-book-dialog">
            <p> 
                Add Book
            </p>
            <form action="" method="get">
                <div class="form-row-item">
                    <label for="title">Title</label>
                    <input type="text" id="input-title" name="title" required>                    
                </div>
                <div class="form-row-item">
                    <label for="author">Author</label>
                    <input type="text" id="input-author" name="author" required>                    
                </div>
            </form>
            <div class="button-wrap">
                <button class="close-button dlg button" commandfor="add-book-dialog" command="close">Close</button>
                <button id="submit" class="submit-button dlg button" type="submit">Submit</button>
            </div>
        
        </dialog>
    </div>

      
</body>

</html>
